services:
  gold-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gold-site
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gold-site.rule=Host(`polygold.prostore.business`)"
      - "traefik.http.routers.gold-site.entrypoints=https"
      - "traefik.http.routers.gold-site.tls=true"
      - "traefik.http.routers.gold-site.tls.certresolver=leresolver"
      - "traefik.http.services.gold-site.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
